version: '3.8'

services:
  backend:
    build:
      context: ./local-ai-assistant
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    volumes:
      - ./local-ai-assistant/data:/app/data
      - ./local-ai-assistant/logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./local-ai-ui:/app
    command: sh -c "npm install && npm start"
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
